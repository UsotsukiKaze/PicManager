<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - PicManager</title>
    <link rel="icon" href="/static/icon/Pic.ico" type="image/x-icon">
    <style>
        :root {
            --bg: #f6f7fb;
            --panel: #ffffff;
            --panel-soft: #f9fafb;
            --text: #171b24;
            --muted: #667085;
            --line: #d9dee7;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --accent: #0f9f7a;
            --warn-bg: #fff7ed;
            --warn-line: #fed7aa;
            --warn-text: #9a3412;
            --danger-bg: #fef2f2;
            --danger-line: #fecaca;
            --danger-text: #b91c1c;
            --shadow: 0 18px 60px rgba(18, 25, 38, 0.14);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
            color: var(--text);
            background:
                linear-gradient(180deg, rgba(37, 99, 235, 0.08), transparent 34%),
                linear-gradient(135deg, #f6f7fb 0%, #eef2f7 58%, #f5fbf8 100%);
        }

        .login-shell {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .login-card {
            width: min(100%, 460px);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(217, 222, 231, 0.9);
            border-radius: 8px;
            box-shadow: var(--shadow);
            overflow: hidden;
            animation: cardIn 360ms ease-out both;
        }

        .login-header {
            padding: 28px 30px 22px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .brand img {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.18);
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .login-header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .login-body { padding: 24px 30px 30px; }

        .login-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            padding: 4px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-soft);
            margin-bottom: 18px;
        }

        .login-tab {
            border: 0;
            border-radius: 6px;
            min-height: 38px;
            background: transparent;
            color: var(--muted);
            font-size: 14px;
            font-weight: 650;
            cursor: pointer;
            transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
        }

        .login-tab:hover { color: var(--text); }

        .login-tab.active {
            color: var(--primary);
            background: #ffffff;
            box-shadow: 0 2px 10px rgba(16, 24, 40, 0.08);
        }

        .login-form { display: none; }
        .login-form.active { display: block; animation: fadeUp 220ms ease-out both; }

        .notice {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-soft);
            padding: 16px;
        }

        .notice strong {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 15px;
        }

        .notice p,
        .notice li {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.75;
        }

        .notice p { margin: 0; }
        .notice ul { margin: 8px 0 0; padding-left: 18px; }

        .ticket-state {
            display: grid;
            gap: 12px;
        }

        .ticket-badge {
            display: inline-flex;
            width: fit-content;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(15, 159, 122, 0.24);
            border-radius: 999px;
            padding: 6px 10px;
            background: rgba(15, 159, 122, 0.08);
            color: #08745a;
            font-size: 12px;
            font-weight: 700;
        }

        .guest-panel { display: grid; gap: 14px; }

        .warning {
            border: 1px solid var(--warn-line);
            border-radius: 8px;
            background: var(--warn-bg);
            color: var(--warn-text);
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.7;
        }

        .login-btn {
            width: 100%;
            min-height: 42px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.26);
        }

        .login-btn:disabled { opacity: 0.65; cursor: wait; transform: none; }
        .guest-btn { background: #334155; box-shadow: 0 10px 24px rgba(51, 65, 85, 0.2); }
        .guest-btn:hover { background: #1f2937; }

        .error-message {
            display: none;
            margin-bottom: 16px;
            border: 1px solid var(--danger-line);
            border-radius: 8px;
            background: var(--danger-bg);
            color: var(--danger-text);
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.7;
        }

        .error-message.show { display: block; }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: -3px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }

        @media (max-width: 520px) {
            .login-shell { padding: 16px; align-items: stretch; }
            .login-card { align-self: center; }
            .login-header, .login-body { padding-left: 20px; padding-right: 20px; }
        }
    </style>
</head>
<body>
    <main class="login-shell">
        <section class="login-card" aria-label="PicManager 登录">
            <header class="login-header">
                <div class="brand">
                    <img src="/static/icon/Pic.ico" alt="PicManager">
                    <h1>PicManager</h1>
                </div>
                <p>通过 QQ 机器人生成的一次性链接登录。页面不再接受手动输入 QQ 号，避免冒用身份。</p>
            </header>

            <div class="login-body">
                <div class="login-tabs" role="tablist">
                    <button class="login-tab active" data-tab="user" type="button">QQ Ticket</button>
                    <button class="login-tab" data-tab="guest" type="button">游客访问</button>
                </div>

                <div class="error-message" id="error-message"></div>

                <div class="login-form active" id="user-form">
                    <div class="ticket-state">
                        <span class="ticket-badge">已启用安全登录</span>
                        <div class="notice">
                            <strong>请从 QQ 机器人获取登录链接</strong>
                            <p>链接会携带一次性 ticket，并与发起请求的 QQ 号绑定。ticket 过期或使用后会自动失效。</p>
                            <ul>
                                <li>管理员入口由管理插件签发。</li>
                                <li>普通上传入口同样使用 QQ 号与 ticket 校验。</li>
                                <li>如果链接失效，请重新向机器人发送指令获取。</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="login-form" id="guest-form">
                    <div class="guest-panel">
                        <div class="notice">
                            <strong>游客模式</strong>
                            <p>游客可以浏览和体验基础功能，但上传、修改、删除等操作会受到频率和审核限制。</p>
                        </div>
                        <div class="warning">游客每日仅有有限次数的上传、修改或删除申请机会。</div>
                        <button class="login-btn guest-btn" type="button" onclick="handleGuestLogin()">以游客身份进入</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-form`).classList.add('active');
                hideError();
            });
        });

        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function hideError() {
            document.getElementById('error-message').classList.remove('show');
        }

        async function handleGuestLogin() {
            hideError();
            const btn = document.querySelector('.guest-btn');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>登录中...';
            try {
                const response = await fetch('/auth/guest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || '游客登录失败');
                window.location.href = '/';
            } catch (error) {
                showError(error.message);
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        async function handleTicketLogin() {
            const params = new URLSearchParams(window.location.search);
            const ticket = params.get('ticket');
            if (!ticket) return false;

            hideError();
            try {
                const response = await fetch('/auth/qq-ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticket, purpose: 'login' })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Ticket 登录失败');

                const redirect = params.get('redirect') || data.redirect_path || '/';
                window.location.href = redirect.startsWith('/') && !redirect.startsWith('//') ? redirect : '/';
                return true;
            } catch (error) {
                showError(error.message);
                window.history.replaceState({}, document.title, '/login');
                return true;
            }
        }

        async function checkAuth() {
            try {
                const response = await fetch('/auth/me');
                if (response.ok) window.location.href = '/';
            } catch (e) {}
        }

        handleTicketLogin().then((handled) => {
            if (!handled) checkAuth();
        });
    </script>
</body>
</html>
