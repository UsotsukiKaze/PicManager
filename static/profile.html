<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - PicManager</title>
    <link rel="icon" href="/static/icon/Pic.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/css/style.css?v=20260622a">
    <style>
        :root {
            --bg-primary: var(--background);
            --bg-secondary: var(--surface);
            --border-color: var(--border);
            --text-muted: var(--text-tertiary);
        }

        .profile-container {
            min-height: 100vh;
            background:
                linear-gradient(180deg, #f7fbff 0%, var(--bg-primary) 280px);
        }

        .profile-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 22px 30px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
        }

        .profile-header h1 {
            color: var(--text-primary);
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn.primary {
            background: #fff;
            color: var(--primary-color);
            border: 1px solid rgba(0, 122, 255, 0.16);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.12);
        }

        .header-btn.primary:hover {
            background: #f7fbff;
            transform: translateY(-2px);
        }

        .header-btn.danger {
            background: #fff;
            color: var(--danger-color);
            border: 1px solid rgba(255, 59, 48, 0.18);
        }

        .header-btn.danger:hover {
            background: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
            transform: translateY(-2px);
        }

        .profile-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 30px 34px;
        }

        .profile-tabs {
            display: flex;
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 18px;
            padding: 8px;
            margin-bottom: 30px;
            box-shadow: 0 12px 34px rgba(29, 29, 31, 0.08);
            overflow: hidden;
        }

        .profile-tab-indicator {
            position: absolute;
            left: 8px;
            top: 8px;
            height: calc(100% - 16px);
            border-radius: 14px;
            background: linear-gradient(135deg, #007AFF 0%, #0A84FF 52%, #20C997 100%);
            box-shadow: 0 8px 22px rgba(0, 122, 255, 0.24);
            opacity: 0;
            pointer-events: none;
            transition: transform 260ms cubic-bezier(.22, 1, .36, 1), width 260ms ease, opacity 180ms ease;
        }

        .profile-tab {
            flex: 1;
            position: relative;
            z-index: 1;
            padding: 14px 20px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: color 180ms ease, background-color 180ms ease;
        }

        .profile-tab:hover {
            color: var(--text-primary);
            background: var(--bg-primary);
        }

        .profile-tab.active {
            background: transparent;
            color: white;
        }

        .profile-tab.hidden {
            display: none;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
            animation: profilePanelIn 220ms cubic-bezier(.22, 1, .36, 1) both;
        }

        .profile-lazy-sentinel {
            height: 1px;
            margin-bottom: 1px;
        }

        @keyframes profilePanelIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 个人信息卡片 */
        .user-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 16px 44px rgba(29, 29, 31, 0.08);
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
        }

        .user-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 96px;
            background:
                linear-gradient(135deg, rgba(0, 122, 255, 0.1), rgba(32, 201, 151, 0.12));
            pointer-events: none;
        }

        .user-avatar-section {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            z-index: 1;
        }

        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 14px 34px rgba(0, 122, 255, 0.18);
            background: #f5f5f7;
        }

        .user-basic-info {
            flex: 1;
        }

        .user-nickname {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px 0;
        }

        .user-qq {
            color: var(--text-secondary);
            font-size: 15px;
            margin: 0 0 10px 0;
        }

        .user-role-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .role-root {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .role-admin {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .role-user {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            color: white;
        }

        .role-guest {
            background: var(--text-muted);
            color: white;
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        .stat-item {
            background: #fff;
            padding: 20px;
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(29, 29, 31, 0.05);
            transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 122, 255, 0.24);
            box-shadow: 0 14px 30px rgba(29, 29, 31, 0.08);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 6px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* 贡献与偏好卡片 */
        .contribution-card,
        .preference-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 16px 44px rgba(29, 29, 31, 0.08);
            margin-bottom: 25px;
        }

        .contribution-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .contribution-score {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #fff;
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 18px;
            padding: 18px 20px;
        }

        .score-main {
            min-width: 120px;
            text-align: center;
        }

        .score-value {
            font-size: 30px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .score-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .score-progress {
            flex: 1;
        }

        .score-bar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, #5AC8FA 100%);
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        .score-hint {
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .contribution-note {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.6;
        }

        .preference-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .preference-block {
            background: #fff;
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 18px;
            padding: 16px;
        }

        .preference-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .preference-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .preference-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .preference-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .preference-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .preference-meter {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .preference-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(135deg, var(--secondary-color) 0%, #8E8CFF 100%);
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        .preference-empty,
        .preference-empty-item {
            font-size: 13px;
            color: var(--text-tertiary);
            text-align: center;
            padding: 12px 0;
        }

        /* 修改密码卡片 */
        .password-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 16px 44px rgba(29, 29, 31, 0.08);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .password-form {
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* 管理员控制台 */
        .admin-section {
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pending-count {
            background: var(--danger-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            margin-left: 10px;
            box-shadow: 0 8px 18px rgba(255, 59, 48, 0.18);
        }

        .request-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .request-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(29, 29, 31, 0.06);
            transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
        }

        .request-card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 122, 255, 0.18);
            box-shadow: 0 16px 38px rgba(29, 29, 31, 0.09);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .request-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .request-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            background: #f5f5f7;
            box-shadow: 0 6px 18px rgba(29, 29, 31, 0.08);
        }

        .request-user-info {
            display: flex;
            flex-direction: column;
        }

        .request-user-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .request-user-qq {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .request-type {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
        }

        .type-add {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .type-edit {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .type-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .request-content {
            background: #fbfcfe;
            padding: 15px;
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 16px;
            margin-bottom: 15px;
        }

        .request-image-preview {
            max-width: 200px;
            max-height: 150px;
            border-radius: 14px;
            margin-bottom: 10px;
            box-shadow: 0 8px 22px rgba(29, 29, 31, 0.08);
        }

        .request-detail {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .request-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .request-status {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-pending {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .status-approved {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .reject-reason {
            width: 100%;
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            font-size: 13px;
            color: var(--text-primary);
        }

        .reject-reason:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .request-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        /* Root控制台 - 管理员管理 */
        .admin-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .admin-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(29, 29, 31, 0.06);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 180ms ease, box-shadow 180ms ease;
        }

        .admin-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 38px rgba(29, 29, 31, 0.09);
        }

        .admin-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            background: #f5f5f7;
            box-shadow: 0 8px 22px rgba(29, 29, 31, 0.08);
        }

        .admin-info {
            flex: 1;
        }

        .admin-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .admin-qq {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .add-admin-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 16px 44px rgba(29, 29, 31, 0.08);
        }

        .add-admin-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .add-admin-form .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        /* 游客信息 */
        .guest-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(229, 229, 231, 0.95);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 16px 44px rgba(29, 29, 31, 0.08);
            overflow: hidden;
            position: relative;
        }

        .guest-card::before {
            content: "";
            position: absolute;
            inset: 0 0 auto 0;
            height: 110px;
            background: linear-gradient(135deg, rgba(0, 122, 255, 0.1), rgba(32, 201, 151, 0.12));
        }

        .guest-icon {
            position: relative;
            font-size: 64px;
            margin-bottom: 20px;
        }

        .guest-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .guest-ip {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .guest-limit-info {
            position: relative;
            background: #fff;
            border: 1px solid rgba(229, 229, 231, 0.95);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
        }

        .limit-progress {
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .limit-bar {
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            transition: width 0.3s ease;
        }

        .limit-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 16px;
            color: white;
            font-weight: 500;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        /* 个人中心移动端适配 */
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
                padding: 16px 18px;
            }

            .header-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .header-btn {
                flex: 1;
                justify-content: center;
            }

            .profile-content {
                padding: 18px;
            }

            .profile-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                border-radius: 16px;
            }

            .profile-tab-indicator {
                display: none;
            }

            .profile-tab.active {
                background: var(--primary-color);
            }

            .profile-tab {
                flex: 0 0 auto;
                white-space: nowrap;
                padding: 12px 16px;
                font-size: 14px;
            }

            .user-avatar-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-avatar {
                width: 80px;
                height: 80px;
            }

            .user-card,
            .password-card,
            .contribution-card,
            .preference-card,
            .guest-card,
            .add-admin-card {
                padding: 20px;
                border-radius: 20px;
            }

            .user-stats,
            .contribution-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
            }

            .contribution-score {
                flex-direction: column;
                align-items: flex-start;
            }

            .score-main {
                text-align: left;
            }

            .request-header,
            .request-actions,
            .add-admin-form {
                flex-direction: column;
                align-items: stretch;
            }

            .request-actions .btn,
            .add-admin-form .btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .profile-content {
                padding: 14px;
            }

            .user-stats,
            .contribution-grid,
            .preference-grid {
                grid-template-columns: 1fr;
            }

            .header-btn {
                padding: 10px 12px;
                font-size: 13px;
            }

            .profile-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <h1>
                <span class="inline-icon icon-user"></span>
                <span>个人中心</span>
            </h1>
            <div class="header-actions">
                <a href="/" class="header-btn primary">返回主页</a>

                                    <input type="text" id="new-nickname-input" class="form-input" placeholder="输入新昵称" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color);">

                    <div class="contribution-card" id="contribution-card" style="display: none;">

                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="stat-approved-add">0</div>
                                <div class="stat-label">图片添加次数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="stat-approved-edit">0</div>
                                <div class="stat-label">图片修改次数</div>

                        <div class="contribution-score">
                            <div class="score-main">
                                <div class="score-value" id="contribution-score">0</div>

                            <div class="score-progress">
                                <div class="score-bar">
                                    <div class="score-fill" id="contribution-bar"></div>

                    <!-- 上传偏好 -->
                    <div class="preference-card" id="preference-card" style="display: none;">
                        <h3 class="card-title">
                            <span class="inline-icon icon-image"></span>
                            <span>上传偏好</span>

                        <div class="preference-grid" id="preference-grid">
                            <div class="preference-block">
                                <div class="preference-title">偏好分组</div>
                                <div class="preference-list" id="preference-groups"></div>
                            </div>
                            <div class="preference-block">
                                <div class="preference-title">偏好角色</div>
                                <div class="preference-list" id="preference-characters"></div>
                            </div>

                        <div class="preference-empty" id="preference-empty" style="display: none;">
                            暂无偏好数据

                    <!-- 修改密码（管理员专用） -->

                        <h3 class="card-title">

                        <div class="password-form">

                                <label>确认新密码</label>
                                <input type="password" id="confirm-password" class="form-input" placeholder="请再次输入新密码">

                            <button class="btn btn-primary" onclick="changePassword()">修改密码</button>

            <!-- 我的审核面板 -->
            <div class="tab-panel" id="my-requests-panel">
                <div class="admin-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            我的待审核记录
                        </h2>
                        <button class="btn btn-secondary btn-sm" onclick="loadMyRequests(true)">
                            <span class="inline-icon icon-refresh"></span>
                            <span>刷新</span>
                        </button>
                    </div>

                    <div class="request-list" id="my-request-list">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>暂无提交记录</p>

            <!-- 管理员控制台面板 -->
            <div class="tab-panel" id="admin-panel">
                <div class="admin-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            待审核请求
                            <span class="pending-count" id="pending-count">0</span>
                        </h2>
                        <button class="btn btn-secondary btn-sm" onclick="loadPendingRequests(true)">
                            <span class="inline-icon icon-refresh"></span>
                            <span>刷新</span>
                        </button>
                    </div>
                    
                    <div class="request-list" id="request-list">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>暂无待审核请求</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Root控制台面板 -->
            <div class="tab-panel" id="root-panel">
                <div class="admin-section">
                    <div class="section-header">
                        <h2 class="section-title">管理员列表</h2>
                    </div>
                    
                    <div class="admin-list" id="admin-list">
                        <!-- 管理员卡片将动态生成 -->
                    </div>

                    <div class="add-admin-card">
                        <h3 class="card-title">➕ 添加管理员</h3>
                        <div class="add-admin-form">
                            <div class="form-group">
                                <label>QQ号码</label>
                                <input type="text" id="new-admin-qq" class="form-input" placeholder="输入QQ号码">
                            </div>
                            <button class="btn btn-primary" onclick="addAdmin()">添加</button>
                        </div>
                        <p style="margin-top: 12px; color: var(--text-secondary); font-size: 13px;">
                            * 新管理员的默认密码为: admin
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        const lazyLoaded = {
            profileStats: false,
            myRequests: false,
            pendingRequests: false,
            adminList: false,
        };
        let profileStatsObserver = null;

        // Toast通知
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function updateProfileTabIndicator() {
            const indicator = document.getElementById('profile-tab-indicator');
            const tabs = document.querySelector('.profile-tabs');
            const active = document.querySelector('.profile-tab.active:not(.hidden)');
            if (!indicator || !tabs || !active) {
                if (indicator) indicator.style.opacity = '0';
                return;
            }

            const tabsRect = tabs.getBoundingClientRect();
            const activeRect = active.getBoundingClientRect();
            indicator.style.opacity = '1';
            indicator.style.width = `${activeRect.width}px`;
            indicator.style.transform = `translateX(${activeRect.left - tabsRect.left}px)`;
        }

        // 标签页切换
        document.querySelectorAll('.profile-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.classList.contains('hidden')) return;
                
                document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-panel`).classList.add('active');
                updateProfileTabIndicator();
                
                // 切换到管理员面板时加载请求
                if (tab.dataset.tab === 'admin') {
                    loadPendingRequests(false);
                }
                // 切换到root面板时加载管理员列表
                if (tab.dataset.tab === 'root') {
                    loadAdminList(false);
                }
                if (tab.dataset.tab === 'my-requests') {
                    loadMyRequests(false);
                }
            });
        });

        window.addEventListener('resize', updateProfileTabIndicator);

        // 获取用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch('/auth/me');
                if (!response.ok) {
                    window.location.href = '/login';
                    return;
                }

                const data = await response.json();

                if (data.is_guest) {
                    // 游客视图
                    document.getElementById('guest-view').style.display = 'block';
                    document.getElementById('user-view').style.display = 'none';
                    document.getElementById('contribution-card').style.display = 'none';
                    document.getElementById('preference-card').style.display = 'none';
                    document.getElementById('guest-ip-display').textContent = data.guest_ip || '--';
                    document.getElementById('remaining-ops').textContent = data.remaining_operations;
                    
                    const percent = (data.remaining_operations / data.daily_limit) * 100;
                    document.getElementById('limit-bar').style.width = `${percent}%`;
                    updateProfileTabIndicator();
                } else {
                    // 用户视图
                    currentUser = data.user;
                    document.getElementById('guest-view').style.display = 'none';
                    document.getElementById('user-view').style.display = 'block';
                    
                    document.getElementById('user-avatar').src = currentUser.avatar_url || '';
                    document.getElementById('user-nickname').textContent = currentUser.nickname || '--';
                    document.getElementById('user-qq').textContent = currentUser.qq_number;
                    
                    const roleEl = document.getElementById('user-role');
                    const roleMap = {
                        'root': { text: 'Root管理员', class: 'role-root' },
                        'admin': { text: '管理员', class: 'role-admin' },
                        'user': { text: '普通用户', class: 'role-user' }
                    };
                    const roleInfo = roleMap[currentUser.role] || { text: '普通用户', class: 'role-user' };
                    roleEl.textContent = roleInfo.text;
                    roleEl.className = `user-role-badge ${roleInfo.class}`;

                    // 格式化注册时间
                    const joinDate = new Date(currentUser.created_at);
                    document.getElementById('stat-joined').textContent = 
                        joinDate.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

                    // 显示管理员专属功能
                    if (currentUser.role === 'root' || currentUser.role === 'admin') {
                        document.getElementById('password-section').style.display = 'block';
                        document.getElementById('admin-tab').classList.remove('hidden');
                    }

                    // 显示普通用户审核列表
                    document.getElementById('my-requests-tab').classList.remove('hidden');

                    // 显示Root专属功能
                    if (currentUser.role === 'root') {
                        document.getElementById('root-tab').classList.remove('hidden');
                    }

                    setupProfileStatsLazyLoad();
                    updateProfileTabIndicator();
                }
            } catch (error) {
                console.error('Failed to load user info:', error);
                window.location.href = '/login';
            }
        }

        function setupProfileStatsLazyLoad() {
            if (lazyLoaded.profileStats) return;
            const target = document.getElementById('profile-stats-sentinel');
            if (!target) return;

            if (!('IntersectionObserver' in window)) {
                loadProfileStats(false);
                return;
            }

            if (profileStatsObserver) {
                profileStatsObserver.disconnect();
            }

            profileStatsObserver = new IntersectionObserver((entries) => {
                if (entries.some(entry => entry.isIntersecting)) {
                    profileStatsObserver.disconnect();
                    profileStatsObserver = null;
                    loadProfileStats(false);
                }
            }, { rootMargin: '180px 0px' });

            profileStatsObserver.observe(target);
        }

        async function loadMyRequests(force = false) {
            if (lazyLoaded.myRequests && !force) return;
            try {
                lazyLoaded.myRequests = true;
                const response = await fetch('/auth/my-requests');
                if (!response.ok) {
                    lazyLoaded.myRequests = false;
                    return;
                }

                const requests = await response.json();
                const container = document.getElementById('my-request-list');

                if (!requests.length) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>暂无提交记录</p>
                        </div>
                    `;
                    return;
                }

                const statusMap = {
                    pending: { text: '待审核', class: 'status-pending' },
                    approved: { text: '已通过', class: 'status-approved' },
                    rejected: { text: '已驳回', class: 'status-rejected' }
                };

                container.innerHTML = requests.map(req => {
                    const statusInfo = statusMap[req.status] || { text: req.status, class: 'status-pending' };
                    const typeMap = {
                        'add': '添加图片',
                        'edit': '编辑图片',
                        'delete': '删除图片',
                        'group_add': '添加分组',
                        'group_edit': '编辑分组',
                        'group_delete': '删除分组',
                        'character_add': '添加角色',
                        'character_edit': '编辑角色',
                        'character_delete': '删除角色'
                    };
                    const typeText = typeMap[req.request_type] || req.request_type;
                    const createdAt = new Date(req.created_at).toLocaleString();
                    const reviewedAt = req.reviewed_at ? new Date(req.reviewed_at).toLocaleString() : '--';

                    return `
                        <div class="request-card">
                            <div class="request-header">
                                <div class="request-user">
                                    <div class="request-user-info">
                                        <span class="request-user-name">${typeText}</span>
                                        <span class="request-user-qq">提交时间：${createdAt}</span>
                                    </div>
                                </div>
                                <span class="request-status ${statusInfo.class}">${statusInfo.text}</span>
                            </div>
                            <div class="request-content">
                                <div class="request-detail">
                                    ${req.image_id ? `<strong>图片ID:</strong> ${req.image_id}<br>` : ''}
                                    ${req.group_info ? `<strong>分组:</strong> ${req.group_info.name}<br>` : ''}
                                    ${req.character_names && req.character_names.length ? `<strong>角色:</strong> ${req.character_names.join(', ')}<br>` : ''}
                                    <strong>审核时间:</strong> ${reviewedAt}
                                    ${req.rejection_reason ? `<div class="request-meta">驳回理由：${req.rejection_reason}</div>` : ''}
                                </div>
                            </div>
                            ${req.status === 'pending' ? `
                                <div class="request-actions">
                                    <button class="btn btn-secondary btn-sm" onclick="cancelMyRequest(${req.id})">撤销申请</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                lazyLoaded.myRequests = false;
                console.error('Failed to load my requests:', error);
            }
        }

        async function cancelMyRequest(requestId) {
            if (!confirm('确定要撤销该申请吗？')) {
                return;
            }

            try {
                const response = await fetch(`/auth/pending/${requestId}`, { method: 'DELETE' });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || '撤销失败');
                }
                showToast(data.message || '请求已撤销');
                loadMyRequests(true);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // 加载贡献与偏好统计
        async function loadProfileStats(force = false) {
            if (lazyLoaded.profileStats && !force) return;
            const contributionCard = document.getElementById('contribution-card');
            const preferenceCard = document.getElementById('preference-card');
            const preferenceGrid = document.getElementById('preference-grid');
            const preferenceEmpty = document.getElementById('preference-empty');

            try {
                lazyLoaded.profileStats = true;
                const response = await fetch('/auth/profile-stats');
                if (!response.ok) {
                    lazyLoaded.profileStats = false;
                    contributionCard.style.display = 'none';
                    preferenceCard.style.display = 'none';
                    return;
                }

                const data = await response.json();

                contributionCard.style.display = 'block';
                preferenceCard.style.display = 'block';

                document.getElementById('stat-approved-total').textContent = data.approved_total ?? 0;
                document.getElementById('stat-approved-add').textContent = data.approved_add ?? 0;
                const approvedEdit = data.approved_edit ?? 0;
                document.getElementById('stat-approved-edit').textContent = approvedEdit;

                const contribution = data.contribution || {};
                const contributionScore = contribution.score ?? 0;
                const contributionPercent = contribution.percent ?? 0;

                document.getElementById('contribution-score').textContent = contributionScore;
                document.getElementById('contribution-percent').textContent = `${contributionPercent}%`;
                document.getElementById('contribution-bar').style.width = `${contributionPercent}%`;
                document.getElementById('contribution-note').textContent = '';

                const preferences = data.preferences || {};
                const groups = preferences.groups || [];
                const characters = preferences.characters || [];
                const totalGroup = preferences.total_group || 0;
                const totalCharacter = preferences.total_character || 0;

                renderPreferenceList('preference-groups', groups, totalGroup, '暂无分组数据');
                renderPreferenceList('preference-characters', characters, totalCharacter, '暂无角色数据');

                if (totalGroup + totalCharacter === 0) {
                    preferenceGrid.style.display = 'none';
                    preferenceEmpty.style.display = 'block';
                } else {
                    preferenceGrid.style.display = 'grid';
                    preferenceEmpty.style.display = 'none';
                }
            } catch (error) {
                lazyLoaded.profileStats = false;
                console.error('Failed to load profile stats:', error);
                contributionCard.style.display = 'none';
                preferenceCard.style.display = 'none';
            }
        }

        function renderPreferenceList(containerId, items, total, emptyText) {
            const container = document.getElementById(containerId);
            if (!items.length) {
                container.innerHTML = `<div class="preference-empty-item">${emptyText}</div>`;
                return;
            }

            container.innerHTML = items.map(item => {
                const percent = total > 0 ? Math.round((item.count / total) * 100) : 0;
                return `
                    <div class="preference-item">
                        <div class="preference-info">
                            <span class="preference-name">${item.name}</span>
                            <span>${item.count} 次 · ${percent}%</span>
                        </div>
                        <div class="preference-meter">
                            <div class="preference-fill" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 切换昵称编辑模式
        function toggleEditNickname() {
            const form = document.getElementById('edit-nickname-form');
            const input = document.getElementById('new-nickname-input');
            
            if (form.style.display === 'none') {
                form.style.display = 'flex';
                input.value = document.getElementById('user-nickname').textContent;
                input.focus();
            } else {
                form.style.display = 'none';
            }
        }

        // 保存新昵称
        async function saveNickname() {
            const newNickname = document.getElementById('new-nickname-input').value.trim();
            
            if (!newNickname) {
                showToast('昵称不能为空', 'error');
                return;
            }
            
            try {
                const response = await fetch('/auth/set-nickname', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: newNickname })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '保存失败');
                }

                const user = data.user;
                document.getElementById('user-nickname').textContent = user.nickname;
                showToast(data.message);
                toggleEditNickname();
            } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        }

        // 修改密码
        async function changePassword() {
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!oldPassword || !newPassword || !confirmPassword) {
                showToast('请填写所有字段', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }

            if (newPassword.length < 4) {
                showToast('新密码长度至少4位', 'error');
                return;
            }

            try {
                const response = await fetch('/auth/password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '修改失败');
                }

                showToast('密码修改成功');
                document.getElementById('old-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // 加载待审核请求
        async function loadPendingRequests(force = false) {
            if (lazyLoaded.pendingRequests && !force) return;
            try {
                lazyLoaded.pendingRequests = true;
                const response = await fetch('/admin/pending');
                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const requests = await response.json();
                document.getElementById('pending-count').textContent = requests.length;

                const container = document.getElementById('request-list');
                
                if (requests.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>暂无待审核请求</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = requests.map(req => {
                    const typeMap = {
                        'add': { text: '添加图片', class: 'type-add' },
                        'edit': { text: '编辑图片', class: 'type-edit' },
                        'delete': { text: '删除图片', class: 'type-delete' },
                        'group_add': { text: '添加分组', class: 'type-add' },
                        'group_edit': { text: '编辑分组', class: 'type-edit' },
                        'group_delete': { text: '删除分组', class: 'type-delete' },
                        'character_add': { text: '添加角色', class: 'type-add' },
                        'character_edit': { text: '编辑角色', class: 'type-edit' },
                        'character_delete': { text: '删除角色', class: 'type-delete' }
                    };
                    const typeInfo = typeMap[req.request_type] || { text: req.request_type, class: '' };

                    const avatar = req.user_avatar || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%23ccc"/></svg>';
                    const userName = req.user_nickname || req.user_qq || `游客(${req.guest_ip})`;
                    const userQQ = req.user_qq || req.guest_ip;

                    let contentHtml = '';
                    if (req.temp_file_path && req.request_type === 'add') {
                        const filename = req.temp_file_path.split(/[/\\]/).pop();
                        contentHtml = `
                            <img src="/resource/pending/${filename}" class="request-image-preview" alt="预览图" onerror="this.style.display='none'">
                            <div class="request-detail">
                                <strong>原始文件名:</strong> ${req.original_filename || '--'}<br>
                                ${req.image_data ? `
                                    <strong>分组:</strong> ${req.group_info ? req.group_info.name : '未选择'}<br>
                                    <strong>角色:</strong> ${req.character_names && req.character_names.length > 0 ? req.character_names.join(', ') : '未选择'}<br>
                                    <strong>PID:</strong> ${req.image_data.pid || '--'}<br>
                                    <strong>描述:</strong> ${req.image_data.description || '--'}
                                ` : '--'}
                            </div>
                        `;
                    } else if (req.request_type === 'edit') {
                        let originalImageHtml = '';
                        if (req.original_image) {
                            originalImageHtml = `
                                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd;">
                                    <strong style="color: #666;">【原图信息】</strong><br>
                                    <strong>原PID:</strong> ${req.original_image.pid || '--'}<br>
                                    <strong>原描述:</strong> ${req.original_image.description || '--'}<br>
                                    <strong>原角色:</strong> ${req.original_image.character_names && req.original_image.character_names.length > 0 ? req.original_image.character_names.join(', ') : '--'}<br>
                                    <div style="margin-top: 10px;">
                                        <img src="/resource/store/${req.original_image.image_id}.${req.original_image.file_extension}" 
                                             class="request-image-preview" alt="原图" onerror="this.style.display='none'">
                                    </div>
                                </div>
                            `;
                        }
                        contentHtml = `
                            <div class="request-detail">
                                <strong>图片ID:</strong> ${req.image_id || '--'}<br>
                                ${req.image_data ? `
                                    <strong>新分组:</strong> ${req.group_info ? req.group_info.name : '(不变)'}<br>
                                    <strong>新角色:</strong> ${req.character_names && req.character_names.length > 0 ? req.character_names.join(', ') : '(不变)'}<br>
                                    <strong>新PID:</strong> ${req.image_data.pid || '(不变)'}<br>
                                    <strong>新描述:</strong> ${req.image_data.description || '(不变)'}
                                ` : '--'}
                                ${originalImageHtml}
                            </div>
                        `;
                    } else if (req.request_type === 'delete') {
                        let originalImageHtml = '';
                        if (req.original_image) {
                            originalImageHtml = `
                                <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd;">
                                    <strong style="color: #666;">【原图信息】</strong><br>
                                    <strong>原PID:</strong> ${req.original_image.pid || '--'}<br>
                                    <strong>原描述:</strong> ${req.original_image.description || '--'}<br>
                                    <strong>原角色:</strong> ${req.original_image.character_names && req.original_image.character_names.length > 0 ? req.original_image.character_names.join(', ') : '--'}<br>
                                    <div style="margin-top: 10px;">
                                        <img src="/resource/store/${req.original_image.image_id}.${req.original_image.file_extension}" 
                                             class="request-image-preview" alt="原图" onerror="this.style.display='none'">
                                    </div>
                                </div>
                            `;
                        }
                        contentHtml = `
                            <div class="request-detail">
                                <strong>请求删除图片ID:</strong> ${req.image_id || '--'}<br>
                                <em style="color: var(--warning-color);">* 批准后该图片将被删除</em>
                                ${originalImageHtml}
                            </div>
                        `;
                    } else if (req.request_type === 'group_add') {
                        contentHtml = `
                            <div class="request-detail">
                                <strong>分组名称:</strong> ${req.group_info ? req.group_info.name : '--'}<br>
                                <strong>描述:</strong> ${req.image_data ? req.image_data.description || '--' : '--'}
                            </div>
                        `;
                    } else if (req.request_type === 'group_edit') {
                        const originalGroup = req.original_group || {};
                        contentHtml = `
                            <div class="request-detail">
                                <strong>分组ID:</strong> ${req.image_data ? req.image_data.group_id || '--' : '--'}<br>
                                <strong>新名称:</strong> ${req.image_data ? req.image_data.name || '(不变)' : '--'}<br>
                                <strong>新描述:</strong> ${req.image_data ? req.image_data.description || '(不变)' : '--'}<br>
                                <div style="margin-top: 10px; color: #666;">
                                    <strong>原分组:</strong> ${originalGroup.name || '--'}<br>
                                    <strong>原描述:</strong> ${originalGroup.description || '--'}
                                </div>
                            </div>
                        `;
                    } else if (req.request_type === 'group_delete') {
                        const originalGroup = req.original_group || {};
                        contentHtml = `
                            <div class="request-detail">
                                <strong>请求删除分组ID:</strong> ${req.image_data ? req.image_data.group_id || '--' : '--'}<br>
                                <strong>分组名称:</strong> ${originalGroup.name || '--'}<br>
                                <em style="color: var(--warning-color);">* 批准后该分组将被删除</em>
                            </div>
                        `;
                    } else if (req.request_type === 'character_add') {
                        const charInfo = req.character_info || {};
                        contentHtml = `
                            <div class="request-detail">
                                <strong>角色名称:</strong> ${charInfo.name || '--'}<br>
                                <strong>所属分组:</strong> ${charInfo.group_name || '--'}<br>
                                <strong>昵称:</strong> ${(charInfo.nicknames && charInfo.nicknames.length) ? charInfo.nicknames.join(', ') : '--'}<br>
                                <strong>描述:</strong> ${charInfo.description || '--'}
                            </div>
                        `;
                    } else if (req.request_type === 'character_edit') {
                        const charInfo = req.character_info || {};
                        const originalChar = req.original_character || {};
                        contentHtml = `
                            <div class="request-detail">
                                <strong>角色ID:</strong> ${req.image_data ? req.image_data.character_id || '--' : '--'}<br>
                                <strong>新名称:</strong> ${charInfo.name || '(不变)'}<br>
                                <strong>新分组:</strong> ${charInfo.group_name || '(不变)'}<br>
                                <strong>新昵称:</strong> ${(charInfo.nicknames && charInfo.nicknames.length) ? charInfo.nicknames.join(', ') : '(不变)'}<br>
                                <strong>新描述:</strong> ${charInfo.description || '(不变)'}
                                <div style="margin-top: 10px; color: #666;">
                                    <strong>原角色:</strong> ${originalChar.name || '--'}<br>
                                    <strong>原分组:</strong> ${originalChar.group_name || '--'}<br>
                                    <strong>原昵称:</strong> ${(originalChar.nicknames && originalChar.nicknames.length) ? originalChar.nicknames.join(', ') : '--'}<br>
                                    <strong>原描述:</strong> ${originalChar.description || '--'}
                                </div>
                            </div>
                        `;
                    } else if (req.request_type === 'character_delete') {
                        const originalChar = req.original_character || {};
                        contentHtml = `
                            <div class="request-detail">
                                <strong>请求删除角色ID:</strong> ${req.image_data ? req.image_data.character_id || '--' : '--'}<br>
                                <strong>角色名称:</strong> ${originalChar.name || '--'}<br>
                                <strong>所属分组:</strong> ${originalChar.group_name || '--'}<br>
                                <em style="color: var(--warning-color);">* 批准后该角色将被删除</em>
                            </div>
                        `;
                    }

                    if (!contentHtml) {
                        const raw = req.image_data ? JSON.stringify(req.image_data, null, 2) : '--';
                        contentHtml = `
                            <div class="request-detail">
                                <strong>请求内容:</strong>
                                <pre style="white-space: pre-wrap; margin-top: 8px;">${raw}</pre>
                            </div>
                        `;
                    }

                    return `
                        <div class="request-card">
                            <div class="request-header">
                                <div class="request-user">
                                    <img src="${avatar}" class="request-avatar" alt="头像">
                                    <div class="request-user-info">
                                        <span class="request-user-name">${userName}</span>
                                        <span class="request-user-qq">${userQQ}</span>
                                    </div>
                                </div>
                                <span class="request-type ${typeInfo.class}">${typeInfo.text}</span>
                            </div>
                            <div class="request-content">
                                ${contentHtml}
                            </div>
                            <div class="request-actions">
                                <button class="btn btn-danger btn-sm" onclick="handleRequest(${req.id}, 'reject')">拒绝</button>
                                <button class="btn btn-success btn-sm" onclick="handleRequest(${req.id}, 'approve')">批准</button>
                            </div>
                            <textarea class="reject-reason" id="reject-reason-${req.id}" placeholder="驳回理由（可选）"></textarea>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                lazyLoaded.pendingRequests = false;
                console.error('Failed to load pending requests:', error);
                showToast('加载待审核请求失败', 'error');
            }
        }

        // 处理审核请求
        async function handleRequest(requestId, action) {
            try {
                let reason = null;
                if (action === 'reject') {
                    const input = document.getElementById(`reject-reason-${requestId}`);
                    reason = input ? input.value.trim() : '';
                }
                const response = await fetch(`/admin/pending/${requestId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, reason })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '操作失败');
                }

                showToast(data.message);
                loadPendingRequests(true);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // 加载管理员列表
        async function loadAdminList(force = false) {
            if (lazyLoaded.adminList && !force) return;
            try {
                lazyLoaded.adminList = true;
                const response = await fetch('/admin/admins');
                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const admins = await response.json();
                const container = document.getElementById('admin-list');

                container.innerHTML = admins.map(admin => {
                    const isRoot = admin.role === 'root';
                    const avatar = admin.avatar_url || `https://q1.qlogo.cn/g?b=qq&nk=${admin.qq_number}&s=640`;
                    
                    return `
                        <div class="admin-card">
                            <img src="${avatar}" class="admin-avatar" alt="头像">
                            <div class="admin-info">
                                <div class="admin-name">${admin.nickname || admin.qq_number}</div>
                                <div class="admin-qq">QQ: ${admin.qq_number}</div>
                                <span class="user-role-badge ${isRoot ? 'role-root' : 'role-admin'}">
                                    ${isRoot ? 'Root' : '管理员'}
                                </span>
                            </div>
                            ${!isRoot ? `
                                <button class="btn btn-danger btn-xs" onclick="removeAdmin('${admin.qq_number}')">
                                    移除
                                </button>
                            ` : ''}
                        </div>
                    `;
                }).join('');

            } catch (error) {
                lazyLoaded.adminList = false;
                console.error('Failed to load admin list:', error);
                showToast('加载管理员列表失败', 'error');
            }
        }

        // 添加管理员
        async function addAdmin() {
            const qq = document.getElementById('new-admin-qq').value.trim();

            if (!qq) {
                showToast('请输入QQ号码', 'error');
                return;
            }

            if (!/^\d{5,12}$/.test(qq)) {
                showToast('请输入有效的QQ号码', 'error');
                return;
            }

            try {
                const response = await fetch('/admin/admins', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qq_number: qq })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '添加失败');
                }

                showToast(data.message);
                document.getElementById('new-admin-qq').value = '';
                loadAdminList(true);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // 移除管理员
        async function removeAdmin(qq) {
            if (!confirm(`确定要移除管理员 ${qq} 吗？`)) {
                return;
            }

            try {
                const response = await fetch(`/admin/admins/${qq}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '移除失败');
                }

                showToast(data.message);
                loadAdminList(true);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        // 退出登录
        async function handleLogout() {
            try {
                await fetch('/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                window.location.href = '/login';
            }
        }

        // 页面加载
        loadUserInfo();
    </script>
</body>
</html>
